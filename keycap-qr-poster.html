<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8" />
<title>QR สั่งพวงกุญแจคีย์แคป</title>
<style>
  @page { size: A5; margin: 0; }
  body { margin: 0; font-family: "Noto Sans Thai", system-ui, sans-serif; }
  .card {
    width: 148mm; height: 210mm; margin: 0 auto;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; gap: 6mm; padding: 12mm; box-sizing: border-box;
    background: #6d28d9; color: #fff;
  }
  .emoji { font-size: 28mm; }
  h1 { font-size: 11mm; margin: 0; }
  p { font-size: 5mm; margin: 0; opacity: .9; }
  .qr { background: #fff; padding: 6mm; border-radius: 6mm; }
  .qr img { width: 70mm; height: 70mm; image-rendering: pixelated; display: block; }
  .url { font-size: 4.5mm; letter-spacing: .2mm; }
  .steps { font-size: 4.5mm; line-height: 1.7; opacity: .95; }
</style>
</head>
<body>
  <div class="card">
    <div class="emoji">⌨️</div>
    <h1>สั่งพวงกุญแจคีย์แคป</h1>
    <p>สแกน QR เพื่อสั่งทำตามชื่อของคุณ</p>
    <div class="qr"><img src="./keycap-qr.png" alt="QR" /></div>
    <div class="url">keycap-shop.vercel.app</div>
    <div class="steps">พิมพ์ชื่อ → เลือกขนาด/สี → เลือกตัวห้อย<br/>กดยืนยัน → รับหมายเลขคิว → รอรับที่ร้าน</div>
  </div>
</body>
</html>
